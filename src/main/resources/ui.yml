menus:
  proposal:
    title: "Marriage Proposal (<player>)"
    structure:
      - "# # # # # # # # #"
      - "# # a # i # d # #"
      - "# # # # # # # # #"
    fill:
      enabled: true
      slot-key: "#"
      material: AIR
      name: " "
      lore: []
    items:
      info:
        slot-key: "i"
        material: PAPER
        amount: 1
        name: "<#f5c2e7><player></#f5c2e7>"
        lore:
          - "<#d3d3d3>Wants to marry you.</#d3d3d3>"
          - "<#6c6f85>Your cost on accept: <u><cost></u></#6c6f85>"
      accept:
        slot-key: "a"
        material: LIME_DYE
        amount: 1
        name: "<#a6e3a1><bold>Accept</bold></#a6e3a1>"
        lore:
          - "<#d3d3d3>Confirm this marriage proposal.</#d3d3d3>"
      deny:
        slot-key: "d"
        material: RED_DYE
        amount: 1
        name: "<#f38ba8><bold>Deny</bold></#f38ba8>"
        lore:
          - "<#d3d3d3>Reject this marriage proposal.</#d3d3d3>"

  divorce:
    title: "Divorce Confirmation (<player>)"
    structure:
      - "# # # # # # # # #"
      - "# # c # i # x # #"
      - "# # # # # # # # #"
    fill:
      enabled: true
      slot-key: "#"
      material: AIR
      name: " "
      lore: []
    items:
      info:
        slot-key: "i"
        material: WRITABLE_BOOK
        amount: 1
        name: "<#f5c2e7><player></#f5c2e7>"
        lore:
          - "<#d3d3d3>This will end your marriage.</#d3d3d3>"
      confirm:
        slot-key: "c"
        material: NETHERITE_AXE
        amount: 1
        name: "<#f38ba8><bold>Confirm Divorce</bold></#f38ba8>"
        lore:
          - "<#d3d3d3>End the marriage immediately.</#d3d3d3>"
      cancel:
        slot-key: "x"
        material: SHIELD
        amount: 1
        name: "<#a6e3a1><bold>Keep Marriage</bold></#a6e3a1>"
        lore:
          - "<#d3d3d3>Close this menu and stay married.</#d3d3d3>"
